apiVersion: v1
kind: Pod
metadata:
  name: cve-2026-31431-test
  namespace: cve-2026-31431-test
  annotations:
    kubernetes.io/description: Testing CVE-2026-31431.
    openshift.io/required-scc: restricted-v2
  labels:
    app: cve-2026-31431-test
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: registry.access.redhat.com/ubi9/python-39:latest
    command: ["python3", "/scripts/cve_test.py"]
    volumeMounts:
    - name: script
      mountPath: /scripts
      readOnly: true
  volumes:
  - name: script
    configMap:
      name: cve-2026-31431-test-script
